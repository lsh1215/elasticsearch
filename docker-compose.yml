services:
  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_VERSION:-3}
    container_name: elasticsearch-study-opensearch
    environment:
      - discovery.type=single-node
      - cluster.name=elasticsearch-study
      - node.name=opensearch-node
      - bootstrap.memory_lock=true
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-StudyDock3r!River42}
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  kibana:
    image: opensearchproject/opensearch-dashboards:${OPENSEARCH_VERSION:-3}
    container_name: elasticsearch-study-kibana
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"

volumes:
  opensearch-data:
